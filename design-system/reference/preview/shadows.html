<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:28px;font-family:var(--font-ui);display:flex;gap:28px;align-items:flex-end;}
  .s{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .b{width:96px;height:72px;background:var(--surface-raised);border-radius:12px;}
  .nm{font-size:11px;color:var(--fg-2);font-family:var(--font-mono);font-weight:500;}
  .s1{box-shadow:0 1px 2px rgba(24,22,36,0.04),0 1px 1px rgba(24,22,36,0.03);}
  .s2{box-shadow:0 2px 4px rgba(24,22,36,0.05),0 6px 16px rgba(24,22,36,0.06);}
  .s3{box-shadow:0 4px 8px rgba(24,22,36,0.06),0 16px 40px rgba(24,22,36,0.10);}
  .s4{box-shadow:0 8px 16px rgba(24,22,36,0.08),0 32px 80px rgba(24,22,36,0.16),0 0 0 0.5px rgba(24,22,36,0.08);}
</style></head>
<body><div class="wrap">
  <div class="s"><div class="b s1"></div><div class="nm">shadow-1 · rest</div></div>
  <div class="s"><div class="b s2"></div><div class="nm">shadow-2 · hover</div></div>
  <div class="s"><div class="b s3"></div><div class="nm">shadow-3 · popover</div></div>
  <div class="s"><div class="b s4"></div><div class="nm">shadow-4 · modal</div></div>
</div></body></html>
