<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .row{display:flex;align-items:baseline;gap:20px;padding:6px 0;}
  .nm{width:90px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono);}
  .spec{color:var(--fg-1);}
  .meta{font-size:10.5px;color:var(--fg-3);margin-left:12px;font-family:var(--font-mono);}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="nm">display</div><div class="spec t-display" style="font-size:56px">Atlas</div></div>
  <div class="row"><div class="nm">h1</div><div class="spec t-h1">The quiet workspace</div><div class="meta">44 · 600 · -1.8%</div></div>
  <div class="row"><div class="nm">h2</div><div class="spec t-h2">Capture everything</div><div class="meta">32 · 600</div></div>
  <div class="row"><div class="nm">h3</div><div class="spec t-h3">Project notes</div><div class="meta">24 · 600</div></div>
  <div class="row"><div class="nm">h4</div><div class="spec t-h4">Today's inbox</div><div class="meta">20 · 600</div></div>
  <div class="row"><div class="nm">title</div><div class="spec t-title">Section title</div><div class="meta">15 · 600</div></div>
</div></body></html>
