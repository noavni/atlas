<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
  .bar{background:var(--indigo-500);height:16px;border-radius:4px;}
  .nm{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head>
<body><div class="wrap">
  <div class="row"><div class="nm">space-1</div><div class="bar" style="width:2px"></div><div class="px">2</div></div>
  <div class="row"><div class="nm">space-2</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="nm">space-3</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="nm">space-4</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="nm">space-5</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="nm">space-6</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="nm">space-7</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="nm">space-8</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="nm">space-9</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="nm">space-10</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
</div></body></html>
