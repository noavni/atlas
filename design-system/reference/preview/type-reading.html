<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<!-- Upgrade Hebrew reading face to Noto Serif Hebrew — higher-contrast, genuine book face -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .meta{font-size:10.5px;color:var(--fg-3);font-family:var(--font-mono);margin-bottom:8px;}
  h1.s{margin:4px 0 8px 0;}
  p.s{margin:0 0 8px 0;max-width:560px;}
  .he-read  { font-family: "Noto Serif Hebrew", "Frank Ruhl Libre", serif; font-size: 20px; line-height: 1.75; color: var(--fg-1); font-weight: 400; }
  .he-lead  { font-family: "Noto Serif Hebrew", serif; font-size: 22px; line-height: 1.6; color: var(--fg-2); font-weight: 500; }
  .row { display: flex; gap: 34px; align-items: flex-start; flex-wrap: wrap; }
  .col { flex: 1; min-width: 240px; }
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="col">
      <div class="meta">reading · Source Serif 4 · en</div>
      <h1 class="s t-read-h1">On quiet tools</h1>
      <p class="s t-read">A tool should disappear into your hand. You stop noticing the pen; the thought travels through it.</p>
    </div>
    <div class="col">
      <div class="meta">reading · Noto Serif Hebrew · he</div>
      <h1 class="s he-lead" dir="rtl" style="margin:4px 0 8px;font-weight:600;">על כלים שקטים</h1>
      <p class="s he-read" dir="rtl">כלי טוב נעלם לתוך היד שלך. אתה מפסיק להבחין בעט; המחשבה עוברת דרכו אל הדף.</p>
    </div>
  </div>
</div></body></html>
