<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:24px 28px;font-family:var(--font-ui);display:flex;gap:18px;flex-wrap:wrap;}
  .s{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .b{background:var(--surface-raised);box-shadow:inset 0 0 0 0.5px var(--border-subtle);width:72px;height:56px;}
  .nm{font-size:10.5px;color:var(--fg-2);font-family:var(--font-mono);}
  .px{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);}
</style></head>
<body><div class="wrap">
  <div class="s"><div class="b" style="border-radius:4px"></div><div class="nm">xs</div><div class="px">4</div></div>
  <div class="s"><div class="b" style="border-radius:8px"></div><div class="nm">sm</div><div class="px">8</div></div>
  <div class="s"><div class="b" style="border-radius:12px"></div><div class="nm">md</div><div class="px">12</div></div>
  <div class="s"><div class="b" style="border-radius:18px"></div><div class="nm">lg</div><div class="px">18</div></div>
  <div class="s"><div class="b" style="border-radius:28px"></div><div class="nm">xl</div><div class="px">28</div></div>
  <div class="s"><div class="b" style="border-radius:36px"></div><div class="nm">2xl</div><div class="px">36</div></div>
  <div class="s"><div class="b" style="border-radius:9999px;width:56px;height:56px"></div><div class="nm">full</div><div class="px">avatars</div></div>
</div></body></html>
