<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);display:flex;gap:18px;flex-wrap:wrap;}
  .block{display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .lbl{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);}
  .v{font-size:11px;color:var(--fg-2);font-family:var(--font-mono);}
  .spring{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-raised);border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,0.04);}
  .ball{width:14px;height:14px;border-radius:50%;background:var(--indigo-500);animation:ball 1800ms cubic-bezier(0.32,0.72,0,1) infinite;}
  .ball.s2{animation-timing-function:cubic-bezier(0.16,1,0.3,1);background:var(--sage-500);}
  .ball.s3{animation-timing-function:cubic-bezier(0.34,1.56,0.64,1);background:var(--amber-500);}
  @keyframes ball{0%{transform:translateX(0)}50%{transform:translateX(120px)}100%{transform:translateX(0)}}
  .name{font-size:12px;font-weight:600;color:var(--fg-1);}
  .curve{width:140px;}
</style></head>
<body><div class="wrap">
  <div class="spring">
    <div style="width:140px;"><div class="ball"></div></div>
    <div><div class="name">gentle</div><div class="v">250ms</div></div>
  </div>
  <div class="spring">
    <div style="width:140px;"><div class="ball s2"></div></div>
    <div><div class="name">snappy</div><div class="v">200ms</div></div>
  </div>
  <div class="spring">
    <div style="width:140px;"><div class="ball s3"></div></div>
    <div><div class="name">bounce</div><div class="v">overshoot</div></div>
  </div>
</div></body></html>
