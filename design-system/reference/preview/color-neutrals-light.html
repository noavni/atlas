<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:96px;}
  .chip{height:56px;border-radius:10px;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.05);}
  .nm{font-size:11px;color:var(--fg-2);margin-top:6px;font-weight:500;}
  .hx{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);margin-top:1px;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="nm">n-0</div><div class="hx">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#FDFCF9"></div><div class="nm">n-25</div><div class="hx">#FDFCF9</div></div>
    <div class="sw"><div class="chip" style="background:#FBFAF7"></div><div class="nm">n-50 · app</div><div class="hx">#FBFAF7</div></div>
    <div class="sw"><div class="chip" style="background:#F5F3EE"></div><div class="nm">n-100</div><div class="hx">#F5F3EE</div></div>
    <div class="sw"><div class="chip" style="background:#EEECE5"></div><div class="nm">n-150</div><div class="hx">#EEECE5</div></div>
    <div class="sw"><div class="chip" style="background:#E4E1D8"></div><div class="nm">n-200</div><div class="hx">#E4E1D8</div></div>
    <div class="sw"><div class="chip" style="background:#D0CCC0"></div><div class="nm">n-300</div><div class="hx">#D0CCC0</div></div>
    <div class="sw"><div class="chip" style="background:#A8A496"></div><div class="nm">n-400</div><div class="hx">#A8A496</div></div>
    <div class="sw"><div class="chip" style="background:#7E7B6E"></div><div class="nm">n-500</div><div class="hx">#7E7B6E</div></div>
    <div class="sw"><div class="chip" style="background:#5E5B50"></div><div class="nm">n-600</div><div class="hx">#5E5B50</div></div>
    <div class="sw"><div class="chip" style="background:#3F3D35"></div><div class="nm">n-700</div><div class="hx">#3F3D35</div></div>
    <div class="sw"><div class="chip" style="background:#24221C"></div><div class="nm">n-800 · ink</div><div class="hx">#24221C</div></div>
    <div class="sw"><div class="chip" style="background:#131109"></div><div class="nm">n-900</div><div class="hx">#131109</div></div>
  </div>
</div></body></html>
