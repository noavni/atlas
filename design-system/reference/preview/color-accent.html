<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .sw{width:104px;}
  .chip{height:56px;border-radius:10px;box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.05);}
  .nm{font-size:11px;color:var(--fg-2);margin-top:6px;font-weight:500;}
  .hx{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);margin-top:1px;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#EEF0FE"></div><div class="nm">indigo-50</div><div class="hx">#EEF0FE</div></div>
    <div class="sw"><div class="chip" style="background:#DCE0FD"></div><div class="nm">indigo-100</div><div class="hx">#DCE0FD</div></div>
    <div class="sw"><div class="chip" style="background:#B9C1FB"></div><div class="nm">indigo-200</div><div class="hx">#B9C1FB</div></div>
    <div class="sw"><div class="chip" style="background:#8E9AF5"></div><div class="nm">indigo-300</div><div class="hx">#8E9AF5</div></div>
    <div class="sw"><div class="chip" style="background:#6B78EF"></div><div class="nm">indigo-400</div><div class="hx">#6B78EF</div></div>
    <div class="sw"><div class="chip" style="background:#4B5BE8;box-shadow:inset 0 0 0 0.5px rgba(255,255,255,0.1),0 0 0 2px rgba(75,91,232,0.18)"></div><div class="nm" style="color:var(--fg-1)">indigo-500 · primary</div><div class="hx">#4B5BE8</div></div>
    <div class="sw"><div class="chip" style="background:#3B48C9"></div><div class="nm">indigo-600</div><div class="hx">#3B48C9</div></div>
    <div class="sw"><div class="chip" style="background:#2E38A0"></div><div class="nm">indigo-700</div><div class="hx">#2E38A0</div></div>
    <div class="sw"><div class="chip" style="background:#1F2672"></div><div class="nm">indigo-800</div><div class="hx">#1F2672</div></div>
  </div>
</div></body></html>
