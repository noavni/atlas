<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--surface-app);}
  .wrap{padding:22px 28px;font-family:var(--font-ui);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:96px;}
  .chip{height:56px;border-radius:10px;box-shadow:inset 0 0 0 0.5px rgba(255,255,255,0.08);}
  .nm{font-size:11px;color:var(--fg-2);margin-top:6px;font-weight:500;}
  .hx{font-size:10px;color:var(--fg-3);font-family:var(--font-mono);margin-top:1px;}
</style></head>
<body><div class="wrap">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="nm">n-0</div><div class="hx">#000000</div></div>
    <div class="sw"><div class="chip" style="background:#0A0B0D"></div><div class="nm">n-25</div><div class="hx">#0A0B0D</div></div>
    <div class="sw"><div class="chip" style="background:#0E1012"></div><div class="nm">n-50 · app</div><div class="hx">#0E1012</div></div>
    <div class="sw"><div class="chip" style="background:#16191D"></div><div class="nm">n-100</div><div class="hx">#16191D</div></div>
    <div class="sw"><div class="chip" style="background:#1C2026"></div><div class="nm">n-150</div><div class="hx">#1C2026</div></div>
    <div class="sw"><div class="chip" style="background:#242931"></div><div class="nm">n-200</div><div class="hx">#242931</div></div>
    <div class="sw"><div class="chip" style="background:#2E333C"></div><div class="nm">n-300</div><div class="hx">#2E333C</div></div>
    <div class="sw"><div class="chip" style="background:#484F5A"></div><div class="nm">n-400</div><div class="hx">#484F5A</div></div>
    <div class="sw"><div class="chip" style="background:#6B7380"></div><div class="nm">n-500</div><div class="hx">#6B7380</div></div>
    <div class="sw"><div class="chip" style="background:#8A92A0"></div><div class="nm">n-600</div><div class="hx">#8A92A0</div></div>
    <div class="sw"><div class="chip" style="background:#B4BAC5"></div><div class="nm">n-700</div><div class="hx">#B4BAC5</div></div>
    <div class="sw"><div class="chip" style="background:#E4E6EB"></div><div class="nm">n-800 · ink</div><div class="hx">#E4E6EB</div></div>
    <div class="sw"><div class="chip" style="background:#F5F6F8"></div><div class="nm">n-900</div><div class="hx">#F5F6F8</div></div>
  </div>
</div></body></html>
